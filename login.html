<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | MS Bar and Lounge</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --bg-darker: #0a0a0a;
            --bg-card: #1a1a1a;
            --text-gold: #D4AF37;
            --text-white: #ffffff;
            --text-gray: #a0a0a0;
        }

        body {
            background-color: var(--bg-darker);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.2);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-white);
            margin-bottom: 2rem;
            display: block;
        }

        .login-logo span {
            color: var(--text-gold);
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-gray);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            border-color: var(--text-gold);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 1rem;
            background: var(--text-gold);
            color: var(--bg-darker);
            border: none;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .error-msg {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: var(--text-gold);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <a href="home.html" class="login-logo">
                <span>MS</span> BAR & LOUNGE
            </a>
            <h2 style="font-family: 'Playfair Display', serif; margin-bottom: 1.5rem; color: var(--text-gold);">Admin Login</h2>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-input" placeholder="Enter username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="Enter password" required>
                </div>
                
                <div id="error-message" class="error-msg">Invalid username or password.</div>
                
                <button type="submit" class="login-btn">Sign In</button>
            </form>
            
            <a href="home.html" class="back-link">← Back to Website</a>
        </div>
    </div>

    <script src="login.js"></script>
</body>
</html>
